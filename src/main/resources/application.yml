spring:
  application:
    name: service-health-monitor

  # Virtual Threads (Project Loom)
  threads:
    virtual:
      enabled: true

  # H2 Database
  datasource:
    url: jdbc:h2:mem:monitordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # GraphQL
  graphql:
    graphiql:
      enabled: true
    path: /graphql

  security:
    jwt:
      secret: "c2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1zaG91bGQtYmUtbG9uZw=="
      expirationMs: 86400000 # 24 hours
    user:
      name: admin
      password: admin

server:
  port: 8081
